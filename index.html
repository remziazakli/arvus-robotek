<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Başvuru Sistemi — Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #21262d;
            --accent: #4f8ef7;
            --accent2: #7c6dfa;
            --text: #e6edf3;
            --muted: #8b949e;
            --danger: #f85149;
            --success: #3fb950;
            --orange: #f0883e
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(79, 142, 247, .08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(124, 109, 250, .08) 0%, transparent 60%)
        }

        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .5)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
            justify-content: center
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            background: transparent;
            display: grid;
            place-items: center;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -.3px
        }

        .logo-text p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px
        }

        .form-group {
            margin-bottom: 18px
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 7px
        }

        input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: .2s
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, .12)
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: .2s;
            letter-spacing: .2px
        }

        .btn:hover {
            opacity: .9;
            transform: translateY(-1px)
        }

        .btn:active {
            transform: translateY(0)
        }

        .error {
            background: rgba(248, 81, 73, .1);
            border: 1px solid rgba(248, 81, 73, .3);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 16px;
            display: none
        }

        .hint {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 20px
        }

        .hint b {
            color: var(--accent)
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon"><img src="arvus-logo.png" alt="Arvus Logo" /></div>
            <div class="logo-text">
                <h1>Başvuru Sistemi</h1>
                <p>ARVUS Takımı</p>
            </div>
        </div>
        <div class="error" id="errBox">Hatalı kullanıcı adı veya şifre!</div>
        <div class="form-group">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>
        <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn" onclick="doLogin()">🔐 Giriş Yap</button>
        <p class="hint">Varsayılan: <b>admin</b> / <b>admin123</b></p>
    </div>
    <script>
        // Varsayılan admin hesabı — ileride ayarlardan değiştirilebilir
        const ADMIN_USER = localStorage.getItem('bs_admin_user') || 'admin';
        const ADMIN_PASS = localStorage.getItem('bs_admin_pass') || 'admin123';

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        // Zaten login ise direkt git
        if (sessionStorage.getItem('bs_auth') === '1') window.location.href = 'admin.html';

        function doLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if (u === ADMIN_USER && p === ADMIN_PASS) {
                sessionStorage.setItem('bs_auth', '1');
                window.location.href = 'admin.html';
            } else {
                const e = document.getElementById('errBox');
                e.style.display = 'block';
                setTimeout(() => e.style.display = 'none', 3000);
            }
        }
    </script>
</body>

</html>
